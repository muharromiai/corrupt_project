version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ck-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: corruption_killer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  hardhat:
    build:
      context: ./blockchain
      dockerfile: Dockerfile
    container_name: ck-hardhat
    ports:
      - "8545:8545"
    volumes:
      - ./blockchain:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8545"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ck-backend
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/corruption_killer?schema=public"
      JWT_SECRET: "your-super-secret-jwt-key-change-in-production"
      JWT_EXPIRES_IN: "7d"
      BACKEND_PORT: "5000"
      FRONTEND_URL: "http://localhost:3000"
      BLOCKCHAIN_RPC_URL: "http://hardhat:8545"
      DEPLOYER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      BUDGET_MANAGER_ADDRESS: ""
      TRANSACTION_MANAGER_ADDRESS: ""
      AUDIT_TRAIL_ADDRESS: ""
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ck-frontend
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5000/api"
      NEXT_PUBLIC_BLOCKCHAIN_NETWORK: "localhost"
      NEXT_PUBLIC_BUDGET_MANAGER_ADDRESS: ""
      NEXT_PUBLIC_TRANSACTION_MANAGER_ADDRESS: ""
      NEXT_PUBLIC_AUDIT_TRAIL_ADDRESS: ""
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
